<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dibattito F1 - Weekend GP</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --rosso: #dc0000;
            --rosso-dark: #b30000;
            --azzurro: #00a3e0;
            --bianco: #ffffff;
            --bg-dark: #0b0b0c;
            --bg-card: #121214;
            --text-primary: #ffffff;
            --text-secondary: #8c8c92;
            --text-muted: #4a4a4f;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--bg-dark);
            background: linear-gradient(135deg, #0b0b0c 0%, #1a0505 25%, #0b0b0c 50%, #0d0000 75%, #0b0b0c 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }

        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(11, 11, 12, 0.95), transparent);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--rosso);
        }

        .nav-links {
            display: flex;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 500;
            transition: color 0.3s ease;
        }

        .nav-links a:hover {
            color: var(--rosso);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 120px 40px 80px;
        }

        .deadline-banner {
            position: fixed;
            top: 80px;
            left: 20px;
            background: linear-gradient(135deg, rgba(220, 0, 0, 0.9) 0%, rgba(180, 0, 0, 0.9) 100%);
            padding: 15px 25px;
            border-radius: 0;
            z-index: 999;
            box-shadow: 0 5px 20px rgba(220, 0, 0, 0.4);
            max-width: 280px;
        }

        .deadline-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 5px;
        }

        .deadline-timer {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--bianco);
            font-family: 'Courier New', monospace;
        }

        .deadline-expired {
            color: #ff6b6b;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .section-header {
            margin-bottom: 50px;
            text-align: center;
        }

        .section-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            color: var(--rosso);
            margin-bottom: 20px;
            font-weight: 600;
        }

        .section-title {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: -2px;
        }

        .section-title span {
            color: var(--rosso);
        }

        .debate-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 25px;
        }

        .debate-card {
            background: linear-gradient(145deg, rgba(18, 18, 20, 0.9) 0%, rgba(26, 5, 5, 0.8) 100%);
            border: 1px solid rgba(220, 0, 0, 0.2);
            padding: 30px;
            transition: all 0.3s ease;
        }

        .debate-card:hover {
            border-color: rgba(220, 0, 0, 0.4);
            transform: translateY(-5px);
        }

        .debate-question {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text-primary);
        }

        .debate-input {
            width: 100%;
            background: rgba(18, 18, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease;
            margin-bottom: 15px;
        }

        .debate-input:focus {
            outline: none;
            border-color: var(--rosso);
        }

        .debate-input-container {
            position: relative;
        }

        .autocomplete-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: rgba(18, 18, 20, 0.98);
            border: 1px solid var(--rosso);
            border-top: none;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }

        .autocomplete-item {
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.9rem;
        }

        .autocomplete-item:hover {
            background: rgba(220, 0, 0, 0.2);
            color: var(--rosso);
        }

        .debate-submit {
            width: 100%;
            background: var(--rosso);
            border: none;
            color: var(--bianco);
            padding: 12px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .debate-submit:hover {
            background: var(--rosso-dark);
            box-shadow: 0 0 20px rgba(220, 0, 0, 0.4);
        }

        .debate-results {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
            font-size: 0.85rem;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
        }

        .result-name {
            color: var(--text-primary);
        }

        .result-count {
            color: var(--rosso);
            font-weight: 600;
        }

        .weekend-badge {
            display: inline-block;
            background: var(--rosso);
            color: var(--bianco);
            padding: 8px 20px;
            font-size: 0.85rem;
            font-weight: 700;
            margin-left: 15px;
            letter-spacing: 1px;
        }

        @media (max-width: 768px) {
            nav {
                padding: 15px 20px;
            }

            .nav-links {
                display: none;
            }

            .container {
                padding: 100px 20px 60px;
            }

            .debate-grid {
                grid-template-columns: 1fr;
            }
        }

        .feedback-section {
            margin-top: 80px;
            padding-top: 60px;
            border-top: 1px solid rgba(220, 0, 0, 0.2);
        }

        .feedback-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            margin-top: 40px;
        }

        .feedback-form {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .feedback-input {
            background: rgba(18, 18, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 12px 15px;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s ease;
        }

        .feedback-input:focus {
            outline: none;
            border-color: var(--rosso);
        }

        .feedback-textarea {
            background: rgba(18, 18, 20, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            font-size: 0.95rem;
            color: var(--text-primary);
            font-family: 'Inter', sans-serif;
            min-height: 100px;
            resize: vertical;
        }

        .feedback-textarea:focus {
            outline: none;
            border-color: var(--rosso);
        }

        .feedback-submit {
            background: var(--rosso);
            border: none;
            color: var(--bianco);
            padding: 15px 30px;
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .feedback-submit:hover {
            background: var(--rosso-dark);
            box-shadow: 0 0 20px rgba(220, 0, 0, 0.4);
        }

        .feedback-list {
            max-height: 300px;
            overflow-y: auto;
        }

        .feedback-item {
            background: rgba(18, 18, 20, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 15px;
            margin-bottom: 15px;
        }

        .feedback-item-name {
            font-weight: 700;
            color: var(--rosso);
            margin-bottom: 5px;
        }

        .feedback-item-text {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .feedback-item-date {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 8px;
        }

        .feedback-empty {
            color: var(--text-muted);
            text-align: center;
            padding: 30px;
            font-style: italic;
        }

        @media (max-width: 768px) {
            .feedback-container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="logo">F1<span>.</span>Analisi</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#model">3D Model</a></li>
            <li><a href="index.html#feedback">Feedback</a></li>
        </ul>
    </nav>

    <div class="deadline-banner" id="deadline-banner">
        <div class="deadline-label">⏰ Tempo rimanente per votare</div>
        <div class="deadline-timer" id="deadline-timer">--:--:--</div>
    </div>

    <div class="container">
        <div class="section-header">
            <div class="section-tag">Community</div>
            <h1 class="section-title">Vota il <span>Weekend GP</span></h1>
            <p style="color: var(--text-secondary); margin-top: 15px; font-size: 1.1rem;">Esprimi le tue preferenze per ogni categoria del weekend!</p>
        </div>

        <div class="debate-grid" id="debate-container"></div>

        <section class="feedback-section">
            <div class="section-header">
                <div class="section-tag">Feedback</div>
                <h2 class="section-title">Migliora il <span>Sito</span></h2>
            </div>
            
            <div class="feedback-container">
                <div class="feedback-form">
                    <input type="text" id="feedback-name" class="feedback-input" placeholder="Il tuo nome">
                    <textarea id="feedback-text" class="feedback-textarea" placeholder="Scrivi un commento o suggerimento..."></textarea>
                    <button class="feedback-submit" onclick="submitFeedback()">Invia Feedback</button>
                </div>
                
                <div class="feedback-list" id="feedback-list">
                    <div class="feedback-empty">Nessun commento ancora. Sii il primo!</div>
                </div>
            </div>
        </section>
    </div>

    <script>
        // F1 2026 Drivers and Teams (Official from formula1.com)
        const f1Drivers = [
            'Max Verstappen', 'Isack Hadjar',
            'Charles Leclerc', 'Lewis Hamilton',
            'Lando Norris', 'Oscar Piastri',
            'George Russell', 'Kimi Antonelli',
            'Fernando Alonso', 'Lance Stroll',
            'Pierre Gasly', 'Franco Colapinto',
            'Carlos Sainz', 'Alexander Albon',
            'Liam Lawson', 'Arvid Lindblad',
            'Nico Hulkenberg', 'Gabriel Bortoleto',
            'Esteban Ocon', 'Oliver Bearman',
            'Sergio Perez', 'Valtteri Bottas'
        ];
        
        const f1Teams = [
            'Ferrari', 'Red Bull Racing', 'McLaren', 'Mercedes',
            'Aston Martin', 'Alpine', 'Williams', 'Racing Bulls',
            'Audi', 'Haas F1 Team', 'Cadillac'
        ];
        
        const questions = [
            { text: '1. Pilota del giorno', type: 'driver' },
            { text: '2. Miglior sorpasso', type: 'driver' },
            { text: '3. Miglior energia', type: 'driver' },
            { text: '4. Più fortunato', type: 'driver' },
            { text: '5. Più sfortunato', type: 'driver' },
            { text: '6. Miglior Team', type: 'team' },
            { text: '7. Miglior giro di qualifica', type: 'driver' },
            { text: '8. Miglior salvataggio', type: 'driver' },
            { text: '9. Miglior battaglia', type: 'driver' },
            { text: '10. Pronostico prossimo GP', type: 'driver' }
        ];

        // Calculate weekend number and deadline
        const seasonStart = new Date('2026-03-06T00:00:00Z'); // First GP weekend
        const now = new Date();
        const daysDiff = Math.floor((now - seasonStart) / (1000 * 60 * 60 * 24));
        const weekendNumber = Math.min(24, Math.max(1, Math.ceil((daysDiff + 5) / 7)));
        
        // Calculate deadline: 3 days after Sunday (Wednesday 23:59:59)
        const weekStart = new Date(seasonStart);
        weekStart.setDate(weekStart.getDate() + (weekendNumber - 1) * 7);
        const deadline = new Date(weekStart);
        deadline.setDate(deadline.getDate() + 9); // Sunday + 3 days = Wednesday
        deadline.setHours(23, 59, 59, 999);
        
        const container = document.getElementById('debate-container');
        const storagePrefix = `debate_w${weekendNumber}_`;
        
        // Countdown timer
        function updateCountdown() {
            const now = new Date();
            const diff = deadline - now;
            
            if (diff <= 0) {
                document.getElementById('deadline-timer').innerHTML = '<span class="deadline-expired">⏰ Votazioni chiuse!</span>';
                document.querySelectorAll('.debate-submit').forEach(btn => {
                    btn.disabled = true;
                    btn.style.opacity = '0.5';
                    btn.style.cursor = 'not-allowed';
                });
                return;
            }
            
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const seconds = Math.floor((diff % (1000 * 60)) / 1000);
            
            if (days > 0) {
                document.getElementById('deadline-timer').textContent = 
                    `${days}g ${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            } else {
                document.getElementById('deadline-timer').textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }
        }
        
        updateCountdown();
        setInterval(updateCountdown, 1000);

        questions.forEach((q, i) => {
            const card = document.createElement('div');
            card.className = 'debate-card';
            card.innerHTML = `
                <div class="debate-question">${q.text}</div>
                <div class="debate-input-container">
                    <input type="text" class="debate-input" id="input-${i}" placeholder="Scrivi il nome..." data-type="${q.type}" data-index="${i}">
                    <div class="autocomplete-dropdown" id="dropdown-${i}"></div>
                </div>
                <button class="debate-submit" onclick="vote(${i})">Vota</button>
                <div class="debate-results" id="results-${i}"></div>
            `;
            container.appendChild(card);
            showResults(i);
        });

        // Autocomplete functionality
        document.querySelectorAll('.debate-input').forEach(input => {
            // Show suggestions on focus
            input.addEventListener('focus', function() {
                const type = this.dataset.type;
                const index = this.dataset.index;
                const dropdown = document.getElementById(`dropdown-${index}`);
                const value = this.value.toLowerCase();
                
                // Show all options when focused and empty
                if (value.length < 2) {
                    const allOptions = type === 'team' ? f1Teams : f1Drivers;
                    dropdown.innerHTML = allOptions.slice(0, 8).map(s => 
                        `<div class="autocomplete-item" onclick="selectSuggestion(${index}, '${s}')">${s}</div>`
                    ).join('');
                    dropdown.style.display = 'block';
                }
            });
            
            input.addEventListener('input', function() {
                const value = this.value.toLowerCase();
                const type = this.dataset.type;
                const index = this.dataset.index;
                const dropdown = document.getElementById(`dropdown-${index}`);
                
                const allOptions = type === 'team' ? f1Teams : f1Drivers;
                
                if (value.length < 2) {
                    // Show popular options
                    dropdown.innerHTML = allOptions.slice(0, 8).map(s => 
                        `<div class="autocomplete-item" onclick="selectSuggestion(${index}, '${s}')">${s}</div>`
                    ).join('');
                    dropdown.style.display = 'block';
                    return;
                }
                
                // Filter and sort by relevance
                const suggestions = allOptions
                    .filter(opt => opt.toLowerCase().includes(value))
                    .sort((a, b) => {
                        // Prioritize starts-with
                        const aStarts = a.toLowerCase().startsWith(value) ? 0 : 1;
                        const bStarts = b.toLowerCase().startsWith(value) ? 0 : 1;
                        return aStarts - bStarts;
                    });
                
                if (suggestions.length > 0) {
                    dropdown.innerHTML = suggestions.slice(0, 8).map(s => 
                        `<div class="autocomplete-item" onclick="selectSuggestion(${index}, '${s}')">${s}</div>`
                    ).join('');
                    dropdown.style.display = 'block';
                } else {
                    dropdown.innerHTML = '<div class="autocomplete-item" style="color: var(--text-muted); cursor: default;">Nessun risultato</div>';
                    dropdown.style.display = 'block';
                }
            });
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!e.target.classList.contains('debate-input')) {
                document.querySelectorAll('.autocomplete-dropdown').forEach(d => d.style.display = 'none');
            }
        });

        window.selectSuggestion = function(index, name) {
            document.getElementById(`input-${index}`).value = name;
            document.getElementById(`dropdown-${index}`).style.display = 'none';
        };

        window.vote = function(index) {
            const input = document.getElementById(`input-${index}`);
            const value = input.value.trim();
            
            if (!value) {
                alert('Inserisci un nome!');
                return;
            }

            const key = storagePrefix + index;
            const votes = JSON.parse(localStorage.getItem(key) || '{}');
            votes[value] = (votes[value] || 0) + 1;
            localStorage.setItem(key, JSON.stringify(votes));
            
            input.value = '';
            showResults(index);
        };

        function showResults(index) {
            const key = storagePrefix + index;
            const votes = JSON.parse(localStorage.getItem(key) || '{}');
            const div = document.getElementById(`results-${index}`);
            
            if (Object.keys(votes).length === 0) {
                div.innerHTML = '<span style="color: var(--text-muted);">Nessun voto ancora</span>';
            } else {
                const sorted = Object.entries(votes).sort((a, b) => b[1] - a[1]).slice(0, 5);
                div.innerHTML = sorted.map(([name, count]) => `
                    <div class="result-row">
                        <span class="result-name">${name}</span>
                        <span class="result-count">${count} voti</span>
                    </div>
                `).join('');
            }
        }

        // Feedback system
        function loadFeedback() {
            const feedbacks = JSON.parse(localStorage.getItem('dibattito_feedbacks') || '[]');
            const listEl = document.getElementById('feedback-list');
            
            if (feedbacks.length === 0) {
                listEl.innerHTML = '<div class="feedback-empty">Nessun commento ancora. Sii il primo!</div>';
                return;
            }
            
            listEl.innerHTML = feedbacks.map(f => `
                <div class="feedback-item">
                    <div class="feedback-item-name">${f.name}</div>
                    <div class="feedback-item-text">${f.text}</div>
                    <div class="feedback-item-date">${f.date}</div>
                </div>
            `).join('');
        }

        window.submitFeedback = function() {
            const name = document.getElementById('feedback-name').value.trim();
            const text = document.getElementById('feedback-text').value.trim();
            
            if (!name || !text) {
                alert('Per favore compila tutti i campi');
                return;
            }
            
            const feedbacks = JSON.parse(localStorage.getItem('dibattito_feedbacks') || '[]');
            feedbacks.unshift({
                name: name,
                text: text,
                date: new Date().toLocaleDateString('it-IT')
            });
            
            localStorage.setItem('dibattito_feedbacks', JSON.stringify(feedbacks));
            document.getElementById('feedback-name').value = '';
            document.getElementById('feedback-text').value = '';
            loadFeedback();
        };

        loadFeedback();
    </script>
</body>
</html>
